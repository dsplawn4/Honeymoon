// Fetch one image per query, all different
function ImageGrid({ queries }) {
  const [images, setImages] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    const load = async () => {
      try {
        // Fetch each query with a page offset to ensure variety
        const results = await Promise.all(
          queries.map((q, i) =>
            fetch(`/api/images?query=${encodeURIComponent(q)}&page=${i + 1}`)
              .then(r => r.json())
              .then(d => {
                const photos = d.photos || [];
                // Pick a different photo for each query to avoid duplicates
                return photos[i % photos.length] || photos[0] || null;
              })
              .catch(() => null)
          )
        );
        if (!cancelled) setImages(results.filter(Boolean));
      } catch(e) {}
      if (!cancelled) setLoading(false);
    };
    load();
    return () => { cancelled = true; };
  }, []);

  if (loading) return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,background:"#000"}}>
      {[0,1,2,3].map(i=>(
        <div key={i} style={{aspectRatio:"4/3",background:"#1a1714",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{width:24,height:24,border:`2px solid ${G}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>
        </div>
      ))}
    </div>
  );

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,background:"#000"}}>
      {images.slice(0,4).map((img,i)=>(
        <div key={i} style={{position:"relative",overflow:"hidden",background:"#1a1714"}}>
          <img src={img.url} alt={img.caption}
            style={{width:"100%",aspectRatio:"4/3",objectFit:"cover",display:"block"}}
            onError={e=>{e.target.style.display="none"}}/>
          <div style={{position:"absolute",bottom:0,left:0,right:0,
            background:"linear-gradient(transparent,rgba(0,0,0,0.7))",
            padding:"20px 8px 6px",fontSize:9,color:"rgba(255,255,255,0.85)",letterSpacing:1}}>
            {img.caption}
          </div>
        </div>
      ))}
    </div>
  );
}
